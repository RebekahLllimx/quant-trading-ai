name: Update Market Data

on:
  schedule:
    # 每个交易日 UTC 10:00 = 北京时间 18:00 (A股收盘后)
    # 周一至周五
    - cron: '0 10 * * 1-5'
  workflow_dispatch:
    # 手动触发入口：GitHub 仓库 → Actions → Update Market Data → Run workflow

# 防止同一 workflow 并发执行（同一天手动触发不会和定时任务冲突）
concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install akshare pandas openpyxl

      - name: Fetch latest market data
        run: python update_all_data.py

      - name: Check for changes
        id: git-check
        run: |
          git status --short
          if git diff --quiet && git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes detected — skipping commit"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/csv/*.csv Task3/dashboard/index.html Task4/dashboard/index.html
          git commit -m "chore(data): auto-update market data $(date +%Y-%m-%d)"
          git push
