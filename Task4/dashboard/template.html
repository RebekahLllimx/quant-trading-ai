<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐢 海龟交易策略回测看板 | Task4</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root { --bg:#f5f6fa; --card:#fff; --text:#2d3436; --muted:#636e72; --accent:#0984e3; --up:#d63031; --down:#00b894; --border:#dfe6e9; --shadow:0 2px 8px rgba(0,0,0,0.06); }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--text); display:flex; min-height:100vh; }
/* Sidebar */
.sidebar { width:300px; min-width:300px; background:var(--card); border-right:1px solid var(--border); padding:16px; overflow-y:auto; display:flex; flex-direction:column; gap:14px; box-shadow:var(--shadow); }
.sidebar h3 { font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
.sidebar label { font-size:12px; color:var(--text); font-weight:600; display:block; margin-bottom:2px; }
.sidebar select, .sidebar input { width:100%; padding:6px 8px; border:1px solid var(--border); border-radius:6px; font-size:13px; background:#fff; }
.sidebar input[type=range] { padding:0; }
.sidebar .param-row { display:flex; align-items:center; gap:6px; }
.sidebar .param-row input[type=range] { flex:1; }
.sidebar .param-row span { font-size:12px; color:var(--muted); min-width:38px; text-align:right; }
.sidebar button { width:100%; padding:10px; background:var(--accent); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; }
.sidebar button:hover { opacity:0.9; }
/* Main */
.main { flex:1; padding:20px 24px; overflow-y:auto; display:flex; flex-direction:column; gap:16px; }
.topbar { background:linear-gradient(135deg,#2d3436,#636e72); color:#fff; padding:14px 24px; font-size:16px; font-weight:700; display:flex; justify-content:space-between; align-items:center; }
.topbar a { color:#dfe6e9; font-size:12px; text-decoration:none; }
/* Cards */
.cards { display:flex; flex-wrap:wrap; gap:10px; }
.card { flex:1; min-width:130px; background:var(--card); border-radius:10px; padding:14px; box-shadow:var(--shadow); text-align:center; }
.card .val { font-size:22px; font-weight:800; }
.card .sub { font-size:11px; color:var(--muted); margin-top:1px; }
.card .lbl { font-size:11px; color:var(--muted); margin-top:4px; }
.card.up .val { color:var(--up); }
.card.down .val { color:var(--down); }
/* Charts */
.chart-box { background:var(--card); border-radius:10px; padding:12px; box-shadow:var(--shadow); }
.chart-box .title { font-size:13px; font-weight:700; margin-bottom:6px; }
.chart-container { width:100%; }
/* Table */
.trade-table { width:100%; border-collapse:collapse; font-size:12px; }
.trade-table th { background:#f1f2f6; padding:6px 8px; text-align:center; font-weight:600; border-bottom:2px solid var(--border); }
.trade-table td { padding:5px 8px; text-align:center; border-bottom:1px solid var(--border); }
.trade-table .win { color:var(--down); font-weight:700; }
.trade-table .loss { color:var(--up); font-weight:700; }
</style>
</head>
<body>
<div class="sidebar">
  <h3>📌 标的选择</h3>
  <select id="stockSelect" onchange="redrawAll()"></select>
  <h3>🐢 入场通道周期</h3>
  <div class="param-row"><input type="range" id="entryPeriod" min="5" max="120" value="20" oninput="document.getElementById('entryPeriodVal').textContent=this.value;redrawAll()"><span id="entryPeriodVal">20</span></div>
  <h3>🚪 离场通道周期</h3>
  <div class="param-row"><input type="range" id="exitPeriod" min="3" max="60" value="10" oninput="document.getElementById('exitPeriodVal').textContent=this.value;redrawAll()"><span id="exitPeriodVal">10</span></div>
  <h3>📏 ATR 周期</h3>
  <div class="param-row"><input type="range" id="atrPeriod" min="5" max="60" value="20" oninput="document.getElementById('atrPeriodVal').textContent=this.value;redrawAll()"><span id="atrPeriodVal">20</span></div>
  <h3>🛑 止损倍数 (×N)</h3>
  <div class="param-row"><input type="range" id="stopMult" min="0.5" max="5" step="0.1" value="2.0" oninput="document.getElementById('stopMultVal').textContent=this.value;redrawAll()"><span id="stopMultVal">2.0</span></div>
  <h3>💰 风险比例 (%)</h3>
  <div class="param-row"><input type="range" id="riskPct" min="0.5" max="5" step="0.1" value="2.0" oninput="document.getElementById('riskPctVal').textContent=this.value;redrawAll()"><span id="riskPctVal">2.0</span></div>
  <h3>💵 初始资金 (万)</h3>
  <input type="number" id="initCap" value="100" step="10" onchange="redrawAll()">
  <h3>📊 交易成本</h3>
  <label>手续费 (%)</label><input type="number" id="feeRate" value="0.03" step="0.01" onchange="redrawAll()">
  <label>滑点 (%)</label><input type="number" id="slippage" value="0.01" step="0.01" onchange="redrawAll()">
  <p style="font-size:10px;color:var(--muted);margin-top:8px;">🐢 海龟 System 1 (20/10)<br>仓位: RiskAmt / (k×N)<br>止损: 2×N 动态上移</p>
</div>
<div class="main">
  <div class="cards" id="cards"></div>
  <div class="chart-box"><div class="title">📈 价格与交易信号</div><div class="chart-container" id="chart1" style="height:500px"></div></div>
  <div class="chart-box"><div class="title">📉 ATR / N 值走势</div><div class="chart-container" id="chart2" style="height:350px"></div></div>
  <div class="chart-box"><div class="title">💹 资产曲线对比</div><div class="chart-container" id="chart3" style="height:400px"></div></div>
  <div class="chart-box"><div class="title">📊 回撤曲线</div><div class="chart-container" id="chart4" style="height:300px"></div></div>
  <div class="chart-box"><div class="title">📋 交易明细</div><div id="tradeTable"></div></div>
</div>

<script>
/* __STOCKS_DATA_PLACEHOLDER__ */

// ═══════════════ JS Turtle Strategy Engine ═══════════════

function sma(arr, n) {
  const r = new Array(arr.length).fill(null);
  let sum = 0, cnt = 0;
  for (let i = 0; i < arr.length; i++) {
    if (arr[i] != null) { sum += arr[i]; cnt++; }
    if (i >= n && arr[i-n] != null) { sum -= arr[i-n]; cnt--; }
    if (cnt >= n) r[i] = sum / cnt;
  }
  return r;
}

function wilderSmooth(arr, n) {
  const r = new Array(arr.length).fill(null);
  const fi = arr.findIndex(v => v != null);
  if (fi < 0) return r;
  // seed: SMA of first n valid
  let sum = 0, cnt = 0;
  for (let i = fi; i < Math.min(fi + n, arr.length); i++) {
    if (arr[i] != null) { sum += arr[i]; cnt++; }
  }
  if (cnt > 0) r[fi + n - 1] = sum / cnt;
  const alpha = 1 / n;
  for (let i = fi + n; i < arr.length; i++) {
    if (arr[i] != null && r[i-1] != null) r[i] = arr[i] * alpha + r[i-1] * (1 - alpha);
    else if (r[i-1] != null) r[i] = r[i-1];
  }
  return r;
}

function calcDonchian(highs, lows, n) {
  const h = new Array(highs.length).fill(null);
  const l = new Array(lows.length).fill(null);
  for (let i = n - 1; i < highs.length; i++) {
    h[i] = Math.max(...highs.slice(i - n + 1, i + 1));
    l[i] = Math.min(...lows.slice(i - n + 1, i + 1));
  }
  return { high: h, low: l };
}

function calcATR(highs, lows, closes, n) {
  const tr = new Array(highs.length).fill(null);
  for (let i = 1; i < highs.length; i++) {
    tr[i] = Math.max(highs[i] - lows[i], Math.abs(highs[i] - closes[i-1]), Math.abs(lows[i] - closes[i-1]));
  }
  return wilderSmooth(tr, n);
}

function runTurtleBacktest(data, entryP, exitP, atrP, stopM, riskP, initCap, feeR, slipR, maxUnits, pyramidAtr) {
  const dates = data.map(d => d[0]);
  const opens = data.map(d => d[1]);
  const closes = data.map(d => d[2]);
  const highs = data.map(d => d[3]);
  const lows = data.map(d => d[4]);

  const nVal = calcATR(highs, lows, closes, atrP);
  const dcEntry = calcDonchian(highs, lows, entryP);
  const dcExit = calcDonchian(highs, lows, exitP);

  let cash = initCap, shares = 0, unitsHeld = 0;
  let entryPrice = 0, stopPrice = 0, lastAddPrice = 0, lastLost = false;
  const trades = [], equity = [], signalsB = [], signalsS = [], signalsX = [], signalsAdd = [];

  const start = Math.max(entryP, exitP, atrP) + 2;

  for (let t = start; t < data.length; t++) {
    const price = closes[t], date = dates[t];
    const eq = cash + shares * price;
    equity.push({ date, equity: eq });

    const nv = nVal[t];
    const entryHPrev = dcEntry.high[t-1];
    const exitLPrev = dcExit.low[t-1];
    if (entryHPrev == null || exitLPrev == null || nv == null) continue;

    // Entry: Today's high breaks above yesterday's entry channel
    const prev2H = dcEntry.high[t-2];
    const prevClose = closes[t-1];
    const breakout = highs[t] > entryHPrev && (prev2H == null || prevClose <= prev2H);

    // Exit: Today's low breaks below yesterday's exit channel
    const exitSig = lows[t] < exitLPrev;

    // Stop check
    let stopHit = false;
    if (unitsHeld > 0 && stopPrice > 0) stopHit = lows[t] <= stopPrice;

    if (breakout && unitsHeld === 0) {
      if (lastLost) { lastLost = false; continue; }
      const bp = price * (1 + slipR);
      const riskAmt = cash * riskP;
      const stopDist = stopM * nv;
      let sh = riskAmt / stopDist;
      const maxSh = cash / (bp * (1 + feeR));
      if (sh > maxSh) sh = maxSh;
      const cost = sh * bp * (1 + feeR);
      if (cost > cash) { sh = cash / (bp * (1 + feeR)); }
      cash -= sh * bp * (1 + feeR);
      entryPrice = bp;
      stopPrice = entryPrice - stopDist;
      shares = sh; unitsHeld = 1; lastAddPrice = bp;
      trades.push({ bDate: date, bPrice: bp, shares: sh, cost: sh * bp * (1 + feeR), sDate: null, sPrice: null, ret: null, reason: null });
      signalsB.push([date, bp]);
    } else if (unitsHeld > 0) {
      // Dynamic stop (only move up)
      const trailStop = price - stopM * nv;
      if (trailStop > stopPrice) stopPrice = trailStop;

      // Pyramid add: price rises pyramidAtr * N above last add price
      if (unitsHeld < maxUnits && nv > 0 && price >= lastAddPrice + pyramidAtr * nv) {
        const addPrice = price * (1 + slipR);
        const riskAmt = cash * riskP;
        const stopDist = stopM * nv;
        let addSh = riskAmt / stopDist;
        const maxAddSh = cash / (addPrice * (1 + feeR));
        if (addSh > maxAddSh) addSh = maxAddSh;
        const addCost = addSh * addPrice * (1 + feeR);
        if (addCost <= cash) {
          cash -= addCost;
          const totalCB = shares * entryPrice + addSh * addPrice;
          shares += addSh;
          entryPrice = totalCB / shares;
          unitsHeld++;
          lastAddPrice = addPrice;
          stopPrice = addPrice - stopDist;
          const trd = trades[trades.length - 1];
          if (!trd.pyramidAdds) trd.pyramidAdds = [];
          trd.pyramidAdds.push({ date, price: addPrice, shares: addSh });
          trd.shares = shares;
          trd.cost += addCost;
          signalsAdd.push([date, addPrice]);
        }
      }

      if (stopHit) {
        const sp = stopPrice * (1 - slipR);
        cash += shares * sp * (1 - feeR);
        const trd = trades[trades.length - 1];
        trd.sDate = date; trd.sPrice = sp;
        trd.ret = (shares * sp * (1 - feeR) / trd.cost - 1) * 100;
        trd.reason = '止损';
        lastLost = trd.ret < 0;
        shares = 0; unitsHeld = 0; stopPrice = 0;
        signalsS.push([date, sp]); signalsX.push([date, sp]);
      } else if (exitSig) {
        const sp = price * (1 - slipR);
        cash += shares * sp * (1 - feeR);
        const trd = trades[trades.length - 1];
        trd.sDate = date; trd.sPrice = sp;
        trd.ret = (shares * sp * (1 - feeR) / trd.cost - 1) * 100;
        trd.reason = '通道离场';
        lastLost = trd.ret < 0;
        shares = 0; unitsHeld = 0; stopPrice = 0;
        signalsS.push([date, sp]);
      }
    }
  }
  // Force close
  if (unitsHeld > 0) {
    const fp = closes[closes.length - 1] * (1 - slipR);
    cash += shares * fp * (1 - feeR);
    const trd = trades[trades.length - 1];
    trd.sDate = dates[dates.length - 1]; trd.sPrice = fp;
    trd.ret = (shares * fp * (1 - feeR) / trd.cost - 1) * 100;
    trd.reason = '强制平仓';
  }

  // Full equity (fill first start days with initCap)
  const fullEq = [];
  for (let i = 0; i < start; i++) fullEq.push({ date: dates[i], equity: initCap });
  fullEq.push(...equity);
  const finalEq = cash + shares * closes[closes.length - 1];

  // Buy & Hold
  const bhPrice0 = closes[0] * (1 + slipR) * (1 + feeR);
  const bhShares = initCap / bhPrice0;
  const bhEq = closes.map((p, i) => ({ date: dates[i], equity: bhShares * p }));
  const bhFinal = bhShares * closes[closes.length - 1];

  return { nVal, dcEntry, dcExit, trades, equity: fullEq, signalsB, signalsS, signalsX, signalsAdd, finalEq, bhEq, bhFinal, params: { entryP, exitP, atrP, stopM, riskP, maxUnits, pyramidAtr } };
}

function calcMetrics(result, initCap) {
  const completed = result.trades.filter(t => t.sDate != null);
  const eqVals = result.equity.map(e => e.equity);
  const finalEq = result.finalEq;
  const totalRet = (finalEq / initCap - 1) * 100;
  const days = Math.max(1, (new Date(result.equity[result.equity.length-1].date) - new Date(result.equity[0].date)) / 86400000);
  const annualRet = (Math.pow(finalEq / initCap, 252 / days) - 1) * 100;

  let peak = -Infinity, mdd = 0;
  for (const eq of eqVals) {
    if (eq > peak) peak = eq;
    const dd = (eq - peak) / peak * 100;
    if (dd < mdd) mdd = dd;
  }

  const dRets = [];
  for (let i = 1; i < eqVals.length; i++) { if (eqVals[i-1] > 0) dRets.push(eqVals[i] / eqVals[i-1] - 1); }
  let sharpe = 0, annualVol = 0;
  if (dRets.length > 1) {
    const mean = dRets.reduce((a,b)=>a+b,0)/dRets.length;
    const variance = dRets.reduce((a,b)=>a+(b-mean)**2,0)/dRets.length;
    const std = Math.sqrt(variance);
    annualVol = std * Math.sqrt(252) * 100;
    if (std > 0) sharpe = Math.sqrt(252) * (mean - 0.02/252) / std;
  }

  const wins = completed.filter(t => t.ret > 0), losses = completed.filter(t => t.ret <= 0);
  const winRate = completed.length > 0 ? wins.length / completed.length * 100 : 0;
  const avgWin = wins.length > 0 ? wins.reduce((a,b)=>a+b.ret,0)/wins.length : 0;
  const avgLoss = losses.length > 0 ? losses.reduce((a,b)=>a+Math.abs(b.ret),0)/losses.length : 0;
  const plr = avgLoss > 0 ? avgWin / avgLoss : null;

  const bhRet = (result.bhFinal / initCap - 1) * 100;

  return { totalRet, annualRet, mdd, sharpe, winRate, plr, annualVol, finalEquity: finalEq, totalTrades: completed.length, stopExits: completed.filter(t => t.reason === '止损').length, signalExits: completed.filter(t => t.reason === '通道离场').length, bhRet, days, avgWin, avgLoss };
}

// ═══════════════ Chart Rendering ═══════════════

let charts = {};

function initCharts() {
  ['chart1','chart2','chart3','chart4'].forEach(id => {
    const dom = document.getElementById(id);
    if (dom) { if (charts[id]) charts[id].dispose(); charts[id] = echarts.init(dom); }
  });
  if (Object.keys(charts).length >= 2) {
    echarts.connect(Object.values(charts).filter(c => c).map(c => c._dom ? c._dom.id : '').filter(Boolean));
  }
}

function getParams() {
  return {
    entryP: parseInt(document.getElementById('entryPeriod').value),
    exitP: parseInt(document.getElementById('exitPeriod').value),
    atrP: parseInt(document.getElementById('atrPeriod').value),
    stopM: parseFloat(document.getElementById('stopMult').value),
    riskP: parseFloat(document.getElementById('riskPct').value) / 100,
    initCap: parseFloat(document.getElementById('initCap').value) * 10000,
    feeR: parseFloat(document.getElementById('feeRate').value) / 100,
    slipR: parseFloat(document.getElementById('slippage').value) / 100,
    maxUnits: parseInt(document.getElementById('maxUnits').value),
    pyramidAtr: parseFloat(document.getElementById('pyramidAtr').value),
  };
}

function redrawAll() {
  const code = document.getElementById('stockSelect').value;
  if (!code || !STOCKS[code]) return;
  const stock = STOCKS[code];
  const p = getParams();

  const result = runTurtleBacktest(stock.data, p.entryP, p.exitP, p.atrP, p.stopM, p.riskP, p.initCap, p.feeR, p.slipR, p.maxUnits, p.pyramidAtr);
  const m = calcMetrics(result, p.initCap);

  // KPI Cards
  const retClass = m.totalRet >= 0 ? 'up' : 'down';
  const plrStr = m.plr != null ? m.plr.toFixed(2) : 'N/A';
  const profitWan = ((m.finalEquity - p.initCap) / 10000).toFixed(2);
  const profitSign = (m.finalEquity - p.initCap) >= 0 ? '+' : '';
  document.getElementById('cards').innerHTML = `
    <div class="card ${retClass}"><div class="val">${m.totalRet.toFixed(2)}%</div><div class="sub">${profitSign}${profitWan}万</div><div class="lbl">累计回报</div></div>
    <div class="card ${retClass}"><div class="val">${(m.finalEquity / 10000).toFixed(2)}万</div><div class="lbl">最终权益</div></div>
    <div class="card ${m.annualRet >= 0 ? 'up':'down'}"><div class="val">${m.annualRet.toFixed(2)}%</div><div class="lbl">年化收益</div></div>
    <div class="card down"><div class="val">${m.mdd.toFixed(2)}%</div><div class="lbl">最大回撤 MDD</div></div>
    <div class="card ${m.sharpe >= 0 ? 'up':'down'}"><div class="val">${m.sharpe.toFixed(3)}</div><div class="lbl">夏普比率</div></div>
    <div class="card"><div class="val">${m.winRate.toFixed(0)}%</div><div class="lbl">胜率</div></div>
    <div class="card"><div class="val">${plrStr}</div><div class="lbl">盈亏比</div></div>
    <div class="card"><div class="val">${m.totalTrades}</div><div class="lbl">交易次数</div></div>
    <div class="card ${m.bhRet >= 0 ? 'up':'down'}"><div class="val">${m.bhRet.toFixed(2)}%</div><div class="lbl">买入持有</div></div>
  `;

  // Build dates array for charts
  const dates = stock.data.map(d => d[0]);
  const closes = stock.data.map(d => d[2]);

  // Chart 1: Price + Channels + Signals
  if (charts['chart1']) {
    charts['chart1'].setOption({
      tooltip: { trigger: 'axis' },
      legend: { data: ['收盘价','入场通道上轨','离场通道下轨','买入','卖出','止损'], top: 5 },
      grid: { left: 60, right: 30, top: 60, bottom: 40 },
      xAxis: { type: 'category', data: dates },
      yAxis: { type: 'value', name: '价格 (元)' },
      dataZoom: [{ type: 'inside', zoomOnMouseWheel: 'ctrl' }],
      series: [
        { name: '收盘价', type: 'line', data: closes, lineStyle: { color: '#2d3436', width: 1 }, itemStyle: { color: '#2d3436' }, symbol: 'none' },
        { name: '入场通道上轨', type: 'line', data: result.dcEntry.high, lineStyle: { color: '#e17055', width: 1, type: 'dashed' }, symbol: 'none' },
        { name: '离场通道下轨', type: 'line', data: result.dcExit.low, lineStyle: { color: '#0984e3', width: 1, type: 'dotted' }, symbol: 'none' },
        { name: '买入', type: 'scatter', data: result.signalsB, symbolSize: 14, itemStyle: { color: '#d63031' }, symbol: 'triangle' },
        { name: '卖出', type: 'scatter', data: result.signalsS, symbolSize: 12, itemStyle: { color: '#00b894' } },
        { name: '止损', type: 'scatter', data: result.signalsX, symbolSize: 10, itemStyle: { color: '#e17055' }, symbol: 'pin' },
      ]
    }, true);
  }

  // Chart 2: ATR
  if (charts['chart2']) {
    charts['chart2'].setOption({
      tooltip: { trigger: 'axis' },
      grid: { left: 60, right: 30, top: 45, bottom: 40 },
      xAxis: { type: 'category', data: dates },
      yAxis: { type: 'value', name: 'N 值 (元)' },
      dataZoom: [{ type: 'inside', zoomOnMouseWheel: 'ctrl' }],
      series: [
        { name: 'N 值 (ATR-20)', type: 'line', data: result.nVal, lineStyle: { color: '#0984e3', width: 1.5 }, areaStyle: { color: 'rgba(9,132,227,0.15)' }, symbol: 'none' },
      ]
    }, true);
  }

  // Chart 3: Equity curves
  if (charts['chart3']) {
    const eqDates = result.equity.map(e => e.date);
    const eqVals = result.equity.map(e => (e.equity / p.initCap * 100).toFixed(1));
    const bhVals = result.bhEq.map(e => (e.equity / p.initCap * 100).toFixed(1));
    charts['chart3'].setOption({
      tooltip: { trigger: 'axis' },
      legend: { data: ['海龟策略','买入持有'], top: 5 },
      grid: { left: 60, right: 30, top: 60, bottom: 40 },
      xAxis: { type: 'category', data: eqDates },
      yAxis: { type: 'value', name: '资产 (%, 初始=100)' },
      dataZoom: [{ type: 'inside', zoomOnMouseWheel: 'ctrl' }],
      series: [
        { name: '海龟策略', type: 'line', data: eqVals, lineStyle: { color: '#0984e3', width: 2 }, symbol: 'none' },
        { name: '买入持有', type: 'line', data: bhVals, lineStyle: { color: '#b2bec3', width: 1, type: 'dashed' }, symbol: 'none' },
      ]
    }, true);
  }

  // Chart 4: Drawdown
  if (charts['chart4']) {
    const eqValsRaw = result.equity.map(e => e.equity);
    const eqDates = result.equity.map(e => e.date);
    let peak2 = -Infinity;
    const ddData = eqValsRaw.map(eq => { if (eq > peak2) peak2 = eq; return ((eq - peak2) / peak2 * 100).toFixed(2); });
    charts['chart4'].setOption({
      tooltip: { trigger: 'axis' },
      grid: { left: 60, right: 30, top: 45, bottom: 40 },
      xAxis: { type: 'category', data: eqDates },
      yAxis: { type: 'value', name: '回撤 (%)', max: 5 },
      dataZoom: [{ type: 'inside', zoomOnMouseWheel: 'ctrl' }],
      series: [
        { name: '回撤', type: 'line', data: ddData, areaStyle: { color: 'rgba(214,48,49,0.15)' }, lineStyle: { color: '#d63031', width: 1 }, symbol: 'none' },
        { name: '0%', type: 'line', data: eqDates.map(() => 0), lineStyle: { color: '#636e72', width: 0.5, type: 'dashed' }, symbol: 'none', silent: true },
      ]
    }, true);
  }

  // Trade Table
  const completed = result.trades.filter(t => t.sDate != null);
  let tableHTML = '<table class="trade-table"><tr><th>#</th><th>买入日</th><th>买入价</th><th>卖出日</th><th>卖出价</th><th>持有</th><th>收益</th><th>原因</th></tr>';
  completed.forEach((t, i) => {
    const cls = t.ret > 0 ? 'win' : 'loss';
    const holdDays = Math.round((new Date(t.sDate) - new Date(t.bDate)) / 86400000);
    tableHTML += `<tr><td>${i+1}</td><td>${t.bDate}</td><td>${t.bPrice.toFixed(2)}</td><td>${t.sDate}</td><td>${t.sPrice.toFixed(2)}</td><td>${holdDays}天</td><td class="${cls}">${t.ret.toFixed(2)}%</td><td>${t.reason}</td></tr>`;
  });
  tableHTML += '</table>';
  if (completed.length === 0) tableHTML = '<p style="color:var(--muted);text-align:center;padding:20px;">暂无完整交易（未出现入场信号或仍在持仓中）</p>';
  document.getElementById('tradeTable').innerHTML = tableHTML;

  // Resize
  setTimeout(() => { Object.values(charts).forEach(c => { if (c) c.resize(); }); }, 50);
}

function init() {
  // Populate stock selector
  const sel = document.getElementById('stockSelect');
  for (const [code, s] of Object.entries(STOCKS)) {
    const opt = document.createElement('option');
    opt.value = code;
    opt.textContent = `${s.name} (${s.code}) · ${s.market}`;
    sel.appendChild(opt);
  }
  sel.value = '600519';

  // Set default param display values
  ['entryPeriodVal','exitPeriodVal','atrPeriodVal','stopMultVal','riskPctVal'].forEach(id => {
    const sliderId = id.replace('Val','');
    document.getElementById(id).textContent = document.getElementById(sliderId).value;
  });

  initCharts();
  // 确保 DOM 布局完成后再首次渲染（修复首次加载无数据问题）
  // setTimeout(0) 确保 DOM 布局完成后再初始化渲染
  setTimeout(() => {
    requestAnimationFrame(() => {
      Object.values(charts).forEach(c => { if (c) c.resize(); });
      redrawAll();
    });
  }, 0);
  window.addEventListener('resize', () => setTimeout(() => { Object.values(charts).forEach(c => { if (c) c.resize(); }); }, 100));
}

document.addEventListener('DOMContentLoaded', init);
// 备用：window.load 再次触发渲染（防止 DOMContentLoaded 时布局未完成）
window.addEventListener('load', () => { setTimeout(() => { Object.values(charts).forEach(c => { if (c) c.resize(); }); redrawAll(); }, 100); });
</script>
</body>
</html>
